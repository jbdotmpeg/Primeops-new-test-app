<!DOCTYPE html>
<html lang="en" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PrimeOps Field Suite</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#09090b">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c2/IT_icon.svg/512px-IT_icon.svg.png">

    <!-- Tailwind & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- SheetJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: {
                brand: { 500: '#f97316', 600: '#ea580c' },
                zinc: { 850: '#1f1f22', 950: '#09090b' },
                incident: { 500: '#ef4444' }
            }}}
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #09090b; color: #f4f4f5; overscroll-behavior-y: contain; }
        
        /* Strict View Management - No Animations to prevent getting stuck */
        .view-section { display: none; }
        .view-section.active { display: block; }
        .step-container { display: none; }
        .step-container.active { display: block; }

        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
        input::-webkit-calendar-picker-indicator { filter: invert(1); }

        .p-input { background: #18181b; border: 1px solid #27272a; border-radius: 0.5rem; padding: 0.75rem 1rem; font-size: 0.875rem; font-weight: 600; color: white; width: 100%; outline: none; }
        .p-input:focus { border-color: #f97316; }
        .p-label { display: block; font-size: 0.65rem; font-weight: 800; color: #a1a1aa; margin-bottom: 0.25rem; text-transform: uppercase; letter-spacing: 0.05em; }
        
        .rack-tile { position: absolute; cursor: move; z-index: 50; touch-action: none; user-select: none; }

        @media print {
            @page { margin: 0.5in; size: letter portrait; }
            body { background: white !important; color: black !important; }
            body.printing header, body.printing main, body.printing .no-print { display: none !important; }
            #printZone { display: block !important; width: 100%; }
            .pr-h1 { font-size: 18pt; font-weight: bold; text-align: center; border-bottom: 2px solid black; padding-bottom: 5px; margin-bottom: 15px; text-transform: uppercase; }
            .pr-h2 { font-size: 11pt; font-weight: bold; background: #eee; padding: 5px; margin-top: 15px; margin-bottom: 5px; -webkit-print-color-adjust: exact; }
            .pr-p { margin: 0 0 5px 0; font-size: 9pt; }
            .pr-table { width: 100%; border-collapse: collapse; font-size: 8.5pt; margin-bottom: 10px; }
            .pr-table th, .pr-table td { border: 1px solid #aaa; padding: 4px; text-align: left; }
            .pr-img { max-width: 100%; max-height: 300px; border: 1px solid #ccc; display: block; margin-top: 10px; }
        }
    </style>
</head>
<body class="dark">

<!-- TOAST NOTIFICATION -->
<div id="toast" class="fixed top-4 left-1/2 transform -translate-x-1/2 bg-brand-500 text-white px-6 py-3 rounded-xl font-bold shadow-2xl transition-all duration-300 z-[9999] translate-y-[-150%]">
    Message
</div>

<!-- GLOBAL HEADER -->
<header class="bg-zinc-950 border-b border-zinc-800 sticky top-0 z-[60] no-print h-16 flex items-center px-4 md:px-8">
    <div class="flex items-center gap-3 cursor-pointer" onclick="App.navigate('dashboard')">
        <div class="bg-brand-500 text-white p-2 rounded-lg"><i data-lucide="layers" class="w-5 h-5"></i></div>
        <div>
            <h1 class="text-sm font-black text-white leading-tight uppercase tracking-widest">PrimeOps</h1>
            <p class="text-[9px] font-bold text-brand-500 uppercase tracking-widest">Brock Prime Technologies</p>
        </div>
    </div>
</header>

<!-- MAIN APP AREA -->
<main class="max-w-[1200px] mx-auto w-full px-4 py-8 pb-32">

    <!-- VIEW: DASHBOARD -->
    <div id="view-dashboard" class="view-section active space-y-8">
        <div class="text-center mt-8">
            <h2 class="text-4xl font-black text-white uppercase italic">Command Center</h2>
            <p class="text-zinc-400 mt-2">PWA Offline-Ready Field Engine.</p>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-4xl mx-auto mt-12">
            
            <button onclick="App.navigate('audit')" class="bg-zinc-900 border border-zinc-800 p-8 rounded-2xl text-left hover:border-brand-500 transition-colors group">
                <div class="w-14 h-14 bg-brand-500/20 text-brand-500 rounded-xl flex items-center justify-center mb-4 group-hover:scale-110 transition-transform"><i data-lucide="clipboard-check" class="w-7 h-7"></i></div>
                <h3 class="text-xl font-bold text-white mb-2">Site Audit Pro</h3>
                <p class="text-zinc-500 text-sm">Full infrastructure sweeps and topology mapping.</p>
            </button>

            <button onclick="App.navigate('outage')" class="bg-zinc-900 border border-zinc-800 p-8 rounded-2xl text-left hover:border-incident-500 transition-colors group">
                <div class="w-14 h-14 bg-incident-500/20 text-incident-500 rounded-xl flex items-center justify-center mb-4 group-hover:scale-110 transition-transform"><i data-lucide="shield-alert" class="w-7 h-7"></i></div>
                <h3 class="text-xl font-bold text-white mb-2">Outage Reporter</h3>
                <p class="text-zinc-500 text-sm">Standardized ISP incident tracking and resolution logging.</p>
            </button>

        </div>
    </div>

    <!-- VIEW: SITE AUDIT -->
    <div id="view-audit" class="view-section">
        <div class="flex flex-col lg:flex-row gap-8">
            
            <!-- Sidebar -->
            <aside class="w-full lg:w-64 shrink-0 no-print space-y-2">
                <button onclick="App.navigate('dashboard')" class="w-full px-4 py-3 bg-zinc-900 border border-zinc-800 text-zinc-400 font-bold rounded-xl mb-4 hover:text-white"><i data-lucide="arrow-left" class="inline w-4 h-4 mr-2"></i> Main Menu</button>
                <div id="auditNav" class="flex lg:flex-col overflow-x-auto gap-2"></div>
            </aside>

            <!-- Main Form -->
            <div class="flex-1 bg-zinc-900 border border-zinc-800 rounded-2xl p-6 md:p-8 relative min-h-[600px]">
                <h2 id="auditStepTitle" class="text-2xl font-black text-white uppercase border-b border-zinc-800 pb-4 mb-6">Step Title</h2>
                
                <form id="form-audit">
                    <!-- Step 1: Location -->
                    <div id="audit-step-1" class="step-container active space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div><label class="p-label">Client / Org Name</label><input type="text" id="aud_org" class="p-input" value="Brock Prime"></div>
                            <div><label class="p-label">Site Name</label><input type="text" id="aud_site" class="p-input"></div>
                            <div>
                                <label class="p-label">Physical Address</label>
                                <div class="flex gap-2">
                                    <input type="text" id="aud_address" class="p-input text-xs">
                                    <button type="button" onclick="App.getGPS('aud_address')" class="bg-zinc-800 px-4 rounded-lg text-brand-500"><i data-lucide="crosshair" class="w-5 h-5"></i></button>
                                </div>
                            </div>
                            <div><label class="p-label">Auditor Name</label><input type="text" id="aud_name" class="p-input"></div>
                        </div>
                    </div>

                    <!-- Step 2: Edge -->
                    <div id="audit-step-2" class="step-container space-y-6">
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="p-label">Primary ISP</label><input type="text" id="aud_isp" class="p-input"></div>
                            <div><label class="p-label">Failover ISP</label><input type="text" id="aud_failover" class="p-input"></div>
                        </div>
                        <div class="pt-4 border-t border-zinc-800">
                            <label class="p-label mb-2">Gateways & Firewalls</label>
                            <div id="inv-gw" class="space-y-2 mb-2"></div>
                            <button type="button" onclick="App.addInv('gw')" class="w-full py-3 bg-zinc-800 text-zinc-300 font-bold rounded-lg text-xs">+ ADD GATEWAY</button>
                        </div>
                    </div>

                    <!-- Step 3: Topology Canvas -->
                    <div id="audit-step-3" class="step-container space-y-6">
                        <div class="flex gap-2 mb-2 no-print">
                            <button type="button" onclick="App.addTile('Switch', 'bg-blue-600')" class="px-3 py-1.5 bg-zinc-800 rounded text-[10px] font-bold text-white">+ Switch</button>
                            <button type="button" onclick="App.addTile('Router', 'bg-emerald-600')" class="px-3 py-1.5 bg-zinc-800 rounded text-[10px] font-bold text-white">+ Router</button>
                            <button type="button" onclick="App.addTile('Firewall', 'bg-red-600')" class="px-3 py-1.5 bg-zinc-800 rounded text-[10px] font-bold text-white">+ Firewall</button>
                            <button type="button" onclick="App.clearCanvas()" class="ml-auto text-red-500 text-xs font-bold px-3">Clear</button>
                        </div>
                        <div class="h-[400px] border-2 border-zinc-700 bg-white rounded-xl relative overflow-hidden">
                            <canvas id="topoCanvas" class="absolute inset-0 w-full h-full z-10"></canvas>
                            <div id="tileLayer" class="absolute inset-0 z-20 pointer-events-none"></div>
                        </div>
                        <p class="text-xs text-zinc-500">Draw cables with your finger. Drag elements to position.</p>
                    </div>

                    <!-- Step 4: Summary -->
                    <div id="audit-step-4" class="step-container space-y-6">
                        <div><label class="p-label">Closing Notes</label><textarea id="aud_notes" rows="4" class="p-input"></textarea></div>
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="p-label">Auditor Signature</label><div class="h-24 bg-white rounded-lg border border-zinc-700"><canvas id="sig1" class="w-full h-full"></canvas></div></div>
                            <div><label class="p-label">Site Rep Signature</label><div class="h-24 bg-white rounded-lg border border-zinc-700"><canvas id="sig2" class="w-full h-full"></canvas></div></div>
                        </div>
                    </div>
                </form>

                <!-- Navigation Footer -->
                <div class="mt-8 pt-6 border-t border-zinc-800 flex justify-between no-print">
                    <button id="audPrev" onclick="App.auditNext(-1)" class="px-6 py-3 bg-zinc-800 text-zinc-300 font-bold rounded-xl hidden">Back</button>
                    <div class="flex gap-3 ml-auto">
                        <button id="audNext" onclick="App.auditNext(1)" class="px-8 py-3 bg-brand-500 text-white font-bold rounded-xl">Next Step</button>
                        <button id="audPdf" onclick="App.exportAudit()" class="px-8 py-3 bg-zinc-700 text-white font-bold rounded-xl hidden"><i data-lucide="printer" class="w-4 h-4 inline mr-2"></i> PDF</button>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- VIEW: OUTAGE -->
    <div id="view-outage" class="view-section">
        <div class="max-w-2xl mx-auto bg-zinc-900 border border-zinc-800 rounded-2xl p-6 md:p-8 relative">
            <button onclick="App.navigate('dashboard')" class="absolute top-6 right-6 text-zinc-500 hover:text-white no-print"><i data-lucide="x" class="w-6 h-6"></i></button>
            <h2 class="text-2xl font-black text-white uppercase mb-2">Outage Reporter</h2>
            <p class="text-zinc-400 text-sm mb-8 border-b border-zinc-800 pb-6">Log ISP/Circuit incidents rapidly.</p>

            <form id="form-outage" class="space-y-6">
                <div>
                    <div class="flex justify-between items-end mb-2">
                        <label class="p-label mb-0">Affected Site</label>
                        <button type="button" onclick="document.getElementById('csvUp').click()" class="text-[10px] text-brand-500 font-bold bg-brand-500/10 px-2 py-1 rounded no-print">Upload CSV</button>
                        <input type="file" id="csvUp" accept=".csv" class="hidden" onchange="App.parseCSV(event)">
                    </div>
                    <input type="text" id="out_site" list="siteDataList" class="p-input" placeholder="Type or select site...">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="p-label">Date</label><input type="date" id="out_date" class="p-input"></div>
                    <div><label class="p-label">Provider/ISP</label><input type="text" id="out_isp" class="p-input"></div>
                    <div><label class="p-label">Circuit ID</label><input type="text" id="out_circ" class="p-input font-mono"></div>
                    <div><label class="p-label">Ticket #</label><input type="text" id="out_tkt" class="p-input font-mono"></div>
                </div>
                <div><label class="p-label">Symptoms & Impact</label><textarea id="out_symp" rows="3" class="p-input"></textarea></div>
                <div><label class="p-label">Resolution Actions</label><textarea id="out_res" rows="3" class="p-input"></textarea></div>

                <div class="pt-6 mt-6 border-t border-zinc-800 flex justify-end no-print">
                    <button type="button" onclick="App.exportOutage()" class="px-8 py-3 bg-incident-500 text-white font-bold rounded-xl shadow-lg"><i data-lucide="printer" class="inline w-4 h-4 mr-2"></i> Export Report</button>
                </div>
            </form>
        </div>
    </div>

</main>

<!-- DYNAMIC PRINT ZONE -->
<div id="printZone" class="hidden"></div>
<datalist id="siteDataList"></datalist>

<script>
    /**
     * PrimeOps Field Engine
     * Simplified, un-breakable Vanilla JS Architecture.
     */
    
    const App = {
        state: {
            view: 'dashboard',
            auditStep: 1,
            inventory: { gw: [] },
            canvasDrawing: null
        },
        
        init: function() {
            lucide.createIcons();
            
            // Restore Basic Data
            document.querySelectorAll('.p-input').forEach(el => {
                if(el.id) {
                    const saved = localStorage.getItem('po_' + el.id);
                    if(saved) el.value = saved;
                    el.addEventListener('input', e => localStorage.setItem('po_' + e.target.id, e.target.value));
                }
            });

            // Set Date Defaults
            if(!document.getElementById('auditDate').value) document.getElementById('auditDate').value = new Date().toISOString().split('T')[0];
            if(!document.getElementById('out_date').value) document.getElementById('out_date').value = new Date().toISOString().split('T')[0];

            this.renderAuditNav();
            this.restoreInventory();

            // Set up Signature Pads
            this.setupSimpleCanvas('sig1');
            this.setupSimpleCanvas('sig2');
        },

        toast: function(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.remove('translate-y-[-150%]');
            setTimeout(() => t.classList.add('translate-y-[-150%]'), 3000);
        },

        navigate: function(viewId) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.getElementById('view-' + viewId).classList.add('active');
            window.scrollTo(0,0);
            
            if(viewId === 'audit') {
                this.goToAuditStep(1);
            }
        },

        // --- SITE AUDIT WIZARD LOGIC ---
        auditSteps: ["Location", "Edge Network", "Topology Canvas", "Sign-Off"],
        
        renderAuditNav: function() {
            const nav = document.getElementById('auditNav');
            nav.innerHTML = this.auditSteps.map((title, idx) => `
                <button type="button" onclick="App.goToAuditStep(${idx+1})" class="w-full text-left px-4 py-3 rounded-xl font-bold text-[10px] uppercase tracking-widest border transition-all ${this.state.auditStep === idx+1 ? 'bg-zinc-800 text-white border-brand-500' : 'bg-zinc-950 text-zinc-500 border-zinc-800'}">
                    ${idx+1}. ${title}
                </button>
            `).join('');
            document.getElementById('auditStepTitle').innerText = `${this.state.auditStep}. ${this.auditSteps[this.state.auditStep-1]}`;
        },

        goToAuditStep: function(step) {
            this.state.auditStep = step;
            this.renderAuditNav();

            // Toggle UI
            document.querySelectorAll('#view-audit .step-container').forEach((el, idx) => {
                if(idx+1 === step) el.classList.add('active');
                else el.classList.remove('active');
            });

            // Buttons
            document.getElementById('audPrev').style.display = step === 1 ? 'none' : 'block';
            document.getElementById('audNext').style.display = step === 4 ? 'none' : 'block';
            document.getElementById('audPdf').style.display = step === 4 ? 'block' : 'none';

            // Crucial: Setup Canvas ONLY when its container is visible
            if(step === 3) {
                setTimeout(() => this.setupTopologyCanvas(), 50);
            }
        },

        auditNext: function(dir) {
            this.goToAuditStep(this.state.auditStep + dir);
        },

        // --- INVENTORY LOGIC ---
        addInv: function(type) {
            this.state.inventory[type].push({ id: Date.now(), name: '', model: '' });
            this.renderInventory(type);
        },
        removeInv: function(type, id) {
            this.state.inventory[type] = this.state.inventory[type].filter(item => item.id !== id);
            this.renderInventory(type);
        },
        renderInventory: function(type) {
            const container = document.getElementById('inv-' + type);
            container.innerHTML = this.state.inventory[type].map(item => `
                <div class="flex gap-2 p-3 bg-zinc-950 border border-zinc-800 rounded-lg relative">
                    <div class="flex-1"><label class="p-label text-[8px]">ID/Name</label><input type="text" class="p-input py-1 text-xs" value="${item.name}" oninput="App.updateInv('${type}', ${item.id}, 'name', this.value)"></div>
                    <div class="flex-1"><label class="p-label text-[8px]">Model</label><input type="text" class="p-input py-1 text-xs" value="${item.model}" oninput="App.updateInv('${type}', ${item.id}, 'model', this.value)"></div>
                    <button type="button" onclick="App.removeInv('${type}', ${item.id})" class="text-zinc-600 hover:text-red-500 font-bold px-2">X</button>
                </div>
            `).join('');
            localStorage.setItem('po_inv', JSON.stringify(this.state.inventory));
        },
        updateInv: function(type, id, field, val) {
            const item = this.state.inventory[type].find(i => i.id === id);
            if(item) { item[field] = val; localStorage.setItem('po_inv', JSON.stringify(this.state.inventory)); }
        },
        restoreInventory: function() {
            try { const s = localStorage.getItem('po_inv'); if(s) this.state.inventory = JSON.parse(s); } catch(e){}
            this.renderInventory('gw');
        },

        // --- CANVAS ENGINE (FLAWLESS VERSION) ---
        setupTopologyCanvas: function() {
            const canvas = document.getElementById('topoCanvas');
            if(canvas.dataset.ready) return;
            canvas.dataset.ready = 'true';
            
            // Fixed internal resolution stops mobile resize bugs
            canvas.width = 1200;
            canvas.height = 800;
            const ctx = canvas.getContext('2d');

            // Restore drawing
            if(this.state.canvasDrawing) {
                const img = new Image();
                img.onload = () => ctx.drawImage(img, 0, 0);
                img.src = this.state.canvasDrawing;
            }

            let isDrawing = false;
            const getPos = (e) => {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                const cX = e.clientX || e.touches[0].clientX;
                const cY = e.clientY || e.touches[0].clientY;
                return { x: (cX - rect.left) * scaleX, y: (cY - rect.top) * scaleY };
            };

            const start = (e) => { isDrawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); };
            const move = (e) => { 
                if(!isDrawing) return; 
                e.preventDefault(); 
                const p = getPos(e); 
                ctx.lineWidth = 5; ctx.lineCap = 'round'; ctx.strokeStyle = '#3b82f6'; 
                ctx.lineTo(p.x, p.y); ctx.stroke(); 
            };
            const end = () => { if(isDrawing) { isDrawing = false; this.state.canvasDrawing = canvas.toDataURL(); } };

            canvas.onmousedown = canvas.ontouchstart = start;
            canvas.onmousemove = canvas.ontouchmove = move;
            canvas.onmouseup = canvas.ontouchend = canvas.onmouseout = end;
        },

        setupSimpleCanvas: function(id) {
            const canvas = document.getElementById(id);
            // Smaller fixed res for signatures
            canvas.width = 600; canvas.height = 200;
            const ctx = canvas.getContext('2d');
            let isDrawing = false;
            
            const getPos = (e) => {
                const rect = canvas.getBoundingClientRect();
                const cX = e.clientX || e.touches[0].clientX;
                const cY = e.clientY || e.touches[0].clientY;
                return { x: (cX - rect.left) * (canvas.width/rect.width), y: (cY - rect.top) * (canvas.height/rect.height) };
            };

            canvas.onmousedown = canvas.ontouchstart = e => { isDrawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); };
            canvas.onmousemove = canvas.ontouchmove = e => { if(!isDrawing) return; e.preventDefault(); const p = getPos(e); ctx.lineWidth = 3; ctx.strokeStyle = '#000'; ctx.lineTo(p.x, p.y); ctx.stroke(); };
            canvas.onmouseup = canvas.ontouchend = canvas.onmouseout = () => isDrawing = false;
        },

        clearCanvas: function(id = 'topologyCanvas') {
            if(id === 'topologyCanvas') {
                const c = document.getElementById('topoCanvas');
                c.getContext('2d').clearRect(0,0,c.width,c.height);
                this.state.canvasDrawing = null;
                document.getElementById('tileLayer').innerHTML = '';
            } else {
                const c = document.getElementById(id);
                c.getContext('2d').clearRect(0,0,c.width,c.height);
            }
        },

        addTile: function(type, bgClass) {
            const label = prompt("Enter Label:", type);
            if(!label) return;
            
            const layer = document.getElementById('tileLayer');
            const tile = document.createElement('div');
            tile.className = `rack-tile px-3 py-1 text-white text-[10px] font-bold rounded shadow-lg border-2 border-white pointer-events-auto ${bgClass}`;
            tile.innerText = label;
            tile.style.left = "10px"; tile.style.top = "10px";
            tile.ondblclick = () => tile.remove();

            let isDragging = false, startX, startY;
            tile.onmousedown = tile.ontouchstart = e => {
                isDragging = true;
                startX = (e.clientX || e.touches[0].clientX) - tile.offsetLeft;
                startY = (e.clientY || e.touches[0].clientY) - tile.offsetTop;
            };
            
            const move = e => {
                if(!isDragging) return;
                e.preventDefault();
                tile.style.left = ((e.clientX || (e.touches && e.touches[0].clientX)) - startX) + 'px';
                tile.style.top = ((e.clientY || (e.touches && e.touches[0].clientY)) - startY) + 'px';
            };
            const stop = () => isDragging = false;
            
            document.addEventListener('mousemove', move, {passive:false});
            document.addEventListener('touchmove', move, {passive:false});
            document.addEventListener('mouseup', stop);
            document.addEventListener('touchend', stop);

            layer.appendChild(tile);
        },

        flattenTopology: function() {
            const main = document.getElementById('topoCanvas');
            const temp = document.createElement('canvas');
            temp.width = main.width; temp.height = main.height;
            const ctx = temp.getContext('2d');
            
            // 1. White BG
            ctx.fillStyle = "white"; ctx.fillRect(0,0,temp.width,temp.height);
            // 2. Draw Lines
            ctx.drawImage(main, 0, 0);
            
            // 3. Draw HTML Tiles
            const rect = main.getBoundingClientRect();
            const scaleX = main.width / rect.width;
            const scaleY = main.height / rect.height;

            document.querySelectorAll('.rack-tile').forEach(t => {
                const tRect = t.getBoundingClientRect();
                const x = (tRect.left - rect.left) * scaleX;
                const y = (tRect.top - rect.top) * scaleY;
                const w = t.offsetWidth * scaleX;
                const h = t.offsetHeight * scaleY;
                
                // Shadow & Box
                ctx.fillStyle = "#000"; ctx.fillRect(x-2, y-2, w+4, h+4);
                ctx.fillStyle = t.classList.contains('bg-blue-600') ? "#2563eb" : (t.classList.contains('bg-red-600') ? "#dc2626" : "#059669");
                ctx.fillRect(x, y, w, h);
                
                // Text
                ctx.fillStyle = "white"; ctx.font = "bold 16px Arial"; ctx.textAlign = "center";
                ctx.fillText(t.innerText, x+(w/2), y+(h/2)+6);
            });

            return temp.toDataURL('image/jpeg', 0.9);
        },

        // --- UTILS ---
        getGPS: function(targetId) {
            const el = document.getElementById(targetId);
            el.value = "Locating...";
            navigator.geolocation.getCurrentPosition(
                p => { el.value = `${p.coords.latitude.toFixed(5)}, ${p.coords.longitude.toFixed(5)}`; },
                e => { el.value = ""; this.toast("GPS Denied by Device."); }
            );
        },

        parseCSV: function(e) {
            const file = e.target.files[0]; if(!file) return;
            const r = new FileReader();
            r.onload = ev => {
                try {
                    const data = new Uint8Array(ev.target.result);
                    const wb = XLSX.read(data, {type: 'array'});
                    const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                    
                    const dl = document.getElementById('siteDataList');
                    dl.innerHTML = json.map(row => {
                        const name = row['Site'] || row['Location'] || row['Name'];
                        return name ? `<option value="${name}">` : '';
                    }).join('');
                    this.toast("Site List Loaded!");
                } catch(err) { this.toast("Failed to read CSV/Excel."); }
            };
            r.readAsArrayBuffer(file);
        },

        // --- EXPORT ENGINES ---
        exportAudit: async function() {
            const org = document.getElementById('aud_org').value || 'PrimeOps';
            const site = document.getElementById('aud_site').value || 'Site';
            
            let html = `
                <h1 class="pr-h1">Infrastructure Audit Report</h1>
                <div class="pr-row">
                    <div class="pr-col"><p class="pr-p"><b>Org:</b> ${org}</p><p class="pr-p"><b>Site:</b> ${site}</p><p class="pr-p"><b>Address:</b> ${document.getElementById('aud_address').value}</p></div>
                    <div class="pr-col"><p class="pr-p"><b>Auditor:</b> ${document.getElementById('aud_name').value}</p><p class="pr-p"><b>Date:</b> ${document.getElementById('audDate')?.value || new Date().toLocaleDateString()}</p></div>
                </div>
                <h2 class="pr-h2">Edge Network</h2>
                <p class="pr-p"><b>Primary ISP:</b> ${document.getElementById('aud_isp').value}</p>
                <p class="pr-p"><b>Failover:</b> ${document.getElementById('aud_failover').value}</p>
            `;

            if(this.state.inventory.gw.length > 0) {
                html += `<h2 class="pr-h2">Network Hardware</h2><table class="pr-table"><thead><tr><th>ID</th><th>Model</th></tr></thead><tbody>`;
                this.state.inventory.gw.forEach(i => html += `<tr><td>${i.name}</td><td>${i.model}</td></tr>`);
                html += `</tbody></table>`;
            }

            html += `<h2 class="pr-h2">Topology & Visuals</h2>`;
            const topoImg = this.flattenTopology();
            html += `<img src="${topoImg}" class="pr-img">`;
            
            html += `<h2 class="pr-h2">Closing & Authorization</h2>`;
            html += `<p class="pr-p">${document.getElementById('aud_notes').value}</p>`;
            html += `
                <div class="pr-row" style="margin-top:20px;">
                    <div class="pr-col"><p><b>Auditor:</b></p><img src="${document.getElementById('sig1').toDataURL()}" class="pr-sig"></div>
                    <div class="pr-col"><p><b>Site Rep:</b></p><img src="${document.getElementById('sig2').toDataURL()}" class="pr-sig"></div>
                </div>
            `;

            document.getElementById('printZone').innerHTML = html;
            
            const origTitle = document.title;
            document.title = `Audit_${org}_${site}`.replace(/\s+/g, '_');
            
            document.body.className = "printing";
            window.print();
            setTimeout(() => { document.body.className = "dark"; document.title = origTitle; }, 500);
        },

        exportOutage: function() {
            const site = document.getElementById('out_site').value || 'Unknown Site';
            let html = `
                <h1 class="pr-h1">ISP Outage Report</h1>
                <div class="pr-row">
                    <div class="pr-col"><p class="pr-p"><b>Site:</b> ${site}</p><p class="pr-p"><b>ISP:</b> ${document.getElementById('out_isp').value}</p><p class="pr-p"><b>Circuit:</b> ${document.getElementById('out_circ').value}</p></div>
                    <div class="pr-col"><p class="pr-p"><b>Date:</b> ${document.getElementById('out_date').value}</p><p class="pr-p"><b>Reporter:</b> ${document.getElementById('reportedBy')?.value||''}</p></div>
                </div>
                <h2 class="pr-h2">Impact</h2>
                <p class="pr-p"><b>Services Down:</b> ${document.getElementById('outServices')?.value||''}</p>
                <p class="pr-p"><b>Symptoms:</b> ${document.getElementById('out_symp').value}</p>
                <h2 class="pr-h2">Resolution</h2>
                <p class="pr-p"><b>Ticket #:</b> ${document.getElementById('out_tkt').value}</p>
                <p class="pr-p"><b>Actions:</b> ${document.getElementById('out_res').value}</p>
            `;
            document.getElementById('printZone').innerHTML = html;
            
            document.body.className = "printing";
            window.print();
            setTimeout(() => document.body.className = "dark", 500);
        }
    };

    window.onload = () => App.init();
</script>
